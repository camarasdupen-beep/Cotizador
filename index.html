<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cotizador · Loyverse</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0c0f; font-family: 'DM Mono', 'IBM Plex Mono', monospace; }
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
    input::placeholder { color: #444; }
    .prod-row:active { background: #1e1e22 !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useRef, useCallback } = React;

  const PROXY = "https://corsproxy.io/?";
  const API   = `${PROXY}https://api.loyverse.com/v1.0`;

  const fmt = (n) =>
    new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n ?? 0);

  const today = new Date().toLocaleDateString("es-MX", {
    day: "2-digit", month: "long", year: "numeric",
  });

  function App() {
    const [token,      setToken]      = useState("");
    const [connected,  setConnected]  = useState(false);
    const [items,      setItems]      = useState([]);
    const [loading,    setLoading]    = useState(false);
    const [error,      setError]      = useState("");
    const [search,     setSearch]     = useState("");
    const [cart,       setCart]       = useState([]);
    const [clientName, setClientName] = useState("");
    const [note,       setNote]       = useState("");
    const [view,       setView]       = useState("catalog");
    const [exporting,  setExporting]  = useState(false);
    const previewRef = useRef(null);

    const fetchItems = useCallback(async (tok) => {
      setLoading(true); setError("");
      try {
        let all = [], cursor = null;
        do {
          const url = `${API}/items?limit=250` + (cursor ? `&cursor=${cursor}` : "");
          const res = await fetch(url, { headers: { Authorization: `Bearer ${tok}` } });
          if (res.status === 401) throw new Error("Token inválido.");
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const data = await res.json();
          all = all.concat(data.items ?? []);
          cursor = data.cursor || null;
        } while (cursor);
        setItems(all);
      } catch (e) {
        setError(e.message);
      } finally {
        setLoading(false);
      }
    }, []);

    const handleConnect = () => {
      if (!token.trim()) return;
      setConnected(true);
      fetchItems(token.trim());
    };

    const addToCart = (item, variant) => {
      setCart(prev => {
        const idx = prev.findIndex(c => c.variant.variant_id === variant.variant_id);
        if (idx >= 0) {
          const next = [...prev];
          next[idx] = { ...next[idx], qty: next[idx].qty + 1 };
          return next;
        }
        return [...prev, { item, variant, qty: 1 }];
      });
    };

    const updateQty = (id, delta) =>
      setCart(prev =>
        prev.map(c => c.variant.variant_id === id ? { ...c, qty: c.qty + delta } : c)
            .filter(c => c.qty > 0)
      );

    const total    = cart.reduce((s, c) => s + (c.variant.default_price ?? 0) * c.qty, 0);
    const filtered = items.filter(it => it.item_name.toLowerCase().includes(search.toLowerCase()));

    const exportPNG = async () => {
      if (!previewRef.current || cart.length === 0) return;
      setExporting(true);
      try {
        if (!window.html2canvas) {
          await new Promise((res, rej) => {
            const s = document.createElement("script");
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
        }
        const canvas = await window.html2canvas(previewRef.current, {
          scale: 2, useCORS: true, backgroundColor: "#0c0c0f",
        });
        const link = document.createElement("a");
        link.download = `presupuesto-${clientName || Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        setExporting(false);
      }
    };

    const C = {
      bg: "#0c0c0f", surface: "#161619", border: "#1e1e22",
      accent: "#e8f54a", text: "#e8e8e8", muted: "#555",
    };

    const inp = (extra = {}) => ({
      fontFamily: "inherit", fontSize: 13, padding: "11px 14px",
      background: C.surface, border: `1px solid ${C.border}`,
      borderRadius: 8, outline: "none", color: C.text, width: "100%", ...extra,
    });

    // ── TOKEN GATE ──────────────────────────────────────────────────────────
    if (!connected) return (
      <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ fontSize: 22, fontWeight: 500, color: C.accent, letterSpacing: "0.15em" }}>◈ COTIZADOR</div>
          <p style={{ fontSize: 14, color: C.text }}>Token de Loyverse</p>
          <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>Configuración → API → Tokens de acceso</p>
          <input type="password" placeholder="Pega tu token aquí…"
            value={token} onChange={e => setToken(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleConnect()}
            style={inp()} />
          {error && <p style={{ fontSize: 12, color: "#ff6b6b" }}>{error}</p>}
          <button onClick={handleConnect}
            style={{ fontFamily: "inherit", fontWeight: 500, fontSize: 13, letterSpacing: "0.1em", background: C.accent, color: C.bg, border: "none", borderRadius: 8, padding: "13px 20px", cursor: "pointer" }}>
            CONECTAR →
          </button>
        </div>
      </div>
    );

    // ── MAIN ─────────────────────────────────────────────────────────────────
    return (
      <div style={{ minHeight: "100vh", background: C.bg, color: C.text }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", borderBottom: `1px solid ${C.border}`, background: C.bg }}>
          <span style={{ fontSize: 14, fontWeight: 500, letterSpacing: "0.15em", color: C.accent }}>◈ COTIZADOR</span>
          <div style={{ display: "flex", gap: 8 }}>
            {loading && <span style={{ fontSize: 11, color: C.muted, alignSelf: "center" }}>cargando…</span>}
            <button onClick={() => fetchItems(token)} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, color: "#888", cursor: "pointer", fontSize: 16, width: 32, height: 32 }}>↻</button>
            <button onClick={() => { setConnected(false); setToken(""); setItems([]); setCart([]); }}
              style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, color: "#888", cursor: "pointer", fontSize: 14, width: 32, height: 32 }}>✕</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}` }}>
          {["catalog", "cart"].map(v => (
            <button key={v} onClick={() => setView(v)}
              style={{ flex: 1, padding: "12px 0", background: "transparent", border: "none", borderBottom: view === v ? `2px solid ${C.accent}` : "2px solid transparent", color: view === v ? C.text : C.muted, fontFamily: "inherit", fontSize: 11, letterSpacing: "0.1em", cursor: "pointer" }}>
              {v === "catalog" ? `PRODUCTOS ${items.length}` : `COTIZACIÓN ${cart.length}`}
            </button>
          ))}
        </div>

        {/* CATALOG */}
        {view === "catalog" && (
          <div style={{ padding: "14px 16px 80px" }}>
            <input placeholder="Buscar producto…" value={search}
              onChange={e => setSearch(e.target.value)} style={{ ...inp(), marginBottom: 12 }} />
            {error && <p style={{ fontSize: 12, color: "#ff6b6b", marginBottom: 8 }}>{error}</p>}
            {loading && <p style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: 24 }}>Cargando productos…</p>}
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {filtered.map(item =>
                (item.variants ?? []).map(variant => (
                  <button key={variant.variant_id} className="prod-row"
                    onClick={() => { addToCart(item, variant); setView("cart"); }}
                    style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", width: "100%", textAlign: "left" }}>
                    <div style={{ flex: 1 }}>
                      <p style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{item.item_name}</p>
                      {variant.sku && <p style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{variant.sku}</p>}
                    </div>
                    <span style={{ fontSize: 13, color: C.accent, whiteSpace: "nowrap" }}>{fmt(variant.default_price)}</span>
                    <span style={{ fontSize: 18, color: "#333" }}>+</span>
                  </button>
                ))
              )}
              {filtered.length === 0 && !loading && items.length > 0 && (
                <p style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: 24 }}>Sin resultados</p>
              )}
            </div>
          </div>
        )}

        {/* CART */}
        {view === "cart" && (
          <div style={{ padding: "14px 16px 80px" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
              <input placeholder="Nombre del cliente" value={clientName}
                onChange={e => setClientName(e.target.value)} style={inp()} />
              <input placeholder="Nota opcional" value={note}
                onChange={e => setNote(e.target.value)} style={inp({ fontSize: 12 })} />
            </div>

            {cart.length === 0
              ? <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 160, color: C.muted, fontSize: 13 }}>Ve a PRODUCTOS y agrega items</div>
              : <>
                  <div style={{ display: "flex", flexDirection: "column", gap: 2, marginBottom: 12 }}>
                    {cart.map(({ item, variant, qty }) => (
                      <div key={variant.variant_id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8 }}>
                        <div style={{ flex: 1 }}>
                          <p style={{ fontSize: 13, fontWeight: 500 }}>{item.item_name}</p>
                          <p style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{fmt(variant.default_price)} c/u</p>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <button onClick={() => updateQty(variant.variant_id, -1)}
                            style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, background: C.bg, color: C.text, cursor: "pointer", fontSize: 16, fontFamily: "inherit" }}>−</button>
                          <span style={{ fontSize: 13, width: 22, textAlign: "center" }}>{qty}</span>
                          <button onClick={() => updateQty(variant.variant_id, +1)}
                            style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, background: C.bg, color: C.text, cursor: "pointer", fontSize: 16, fontFamily: "inherit" }}>+</button>
                        </div>
                        <span style={{ fontSize: 13, fontWeight: 600, color: C.accent, width: 80, textAlign: "right" }}>
                          {fmt((variant.default_price ?? 0) * qty)}
                        </span>
                      </div>
                    ))}
                  </div>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, marginBottom: 12 }}>
                    <span style={{ fontSize: 11, letterSpacing: "0.15em", color: C.muted }}>TOTAL</span>
                    <span style={{ fontSize: 22, fontWeight: 500, color: C.accent }}>{fmt(total)}</span>
                  </div>

                  <button onClick={exportPNG} disabled={exporting}
                    style={{ width: "100%", fontFamily: "inherit", fontWeight: 500, fontSize: 13, letterSpacing: "0.1em", background: C.accent, color: C.bg, border: "none", borderRadius: 8, padding: "15px 0", cursor: "pointer", marginBottom: 8 }}>
                    {exporting ? "GENERANDO…" : "⬇ DESCARGAR PNG"}
                  </button>
                  <button onClick={() => setCart([])}
                    style={{ width: "100%", fontFamily: "inherit", fontSize: 11, background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 0", cursor: "pointer" }}>
                    Limpiar cotización
                  </button>
                </>
            }
          </div>
        )}

        {/* OFF-SCREEN PREVIEW */}
        {cart.length > 0 && (
          <div style={{ position: "fixed", left: -9999, top: 0, pointerEvents: "none" }}>
            <div ref={previewRef} style={{ width: 560, background: C.bg, fontFamily: "inherit", color: C.text, padding: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 24px", borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 14, fontWeight: 500, color: C.accent, letterSpacing: "0.15em" }}>◈ COTIZADOR</span>
                <span style={{ fontSize: 11, color: C.muted }}>{today}</span>
              </div>
              {(clientName || note) && (
                <div style={{ padding: "14px 24px", borderBottom: `1px solid ${C.border}` }}>
                  {clientName && <p style={{ fontSize: 16, fontWeight: 500 }}>{clientName}</p>}
                  {note && <p style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>{note}</p>}
                </div>
              )}
              <div style={{ display: "flex", gap: 8, fontSize: 9, letterSpacing: "0.1em", color: "#444", padding: "10px 24px", borderBottom: `1px solid ${C.border}` }}>
                <span style={{ flex: 1 }}>Producto</span>
                <span style={{ width: 36, textAlign: "center" }}>Ctd</span>
                <span style={{ width: 80, textAlign: "right" }}>P/U</span>
                <span style={{ width: 90, textAlign: "right" }}>Total</span>
              </div>
              {cart.map(({ item, variant, qty }, i) => (
                <div key={variant.variant_id} style={{ display: "flex", gap: 8, fontSize: 12, padding: "10px 24px", alignItems: "center", background: i % 2 === 0 ? "#161619" : C.bg }}>
                  <span style={{ flex: 1 }}>{item.item_name}</span>
                  <span style={{ width: 36, textAlign: "center", color: C.muted }}>{qty}</span>
                  <span style={{ width: 80, textAlign: "right", color: C.muted }}>{fmt(variant.default_price)}</span>
                  <span style={{ width: 90, textAlign: "right", color: C.accent, fontWeight: 600 }}>{fmt((variant.default_price ?? 0) * qty)}</span>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "16px 24px", borderTop: `1px solid #2a2a2e`, marginTop: 4 }}>
                <span style={{ fontSize: 10, letterSpacing: "0.15em", color: C.muted }}>TOTAL</span>
                <span style={{ fontSize: 20, fontWeight: 500, color: C.accent }}>{fmt(total)}</span>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
